{% extends 'base.html' %}

{% block title %}Tambah Siswa - Sipustaka{% endblock %}

{% block content %}
<div class="mb-6 flex items-center space-x-4">
    <a href="{% url 'list_siswa' %}" class="flex items-center justify-center w-10 h-10 bg-white rounded-full shadow-sm border border-gray-100 hover:bg-gray-50 transition text-gray-500">
        ←
    </a>
    <div>
        <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Kelola Siswa</p>
        <h2 class="text-2xl font-bold text-gray-800">Tambah Siswa Baru</h2>
    </div>
</div>

<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 max-w-4xl">
    <form method="POST" action="" class="space-y-6">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Nama Lengkap</label>
                <input type="text" name="nama" placeholder="Masukkan nama lengkap siswa" required 
                       class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition bg-gray-50 hover:bg-white">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Kelas</label>
                <input type="text" name="kelas" placeholder="Contoh: X IPA 1" required 
                       class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition bg-gray-50 hover:bg-white">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">NIS (Nomor Induk Siswa)</label>
                <input type="text" name="nis" placeholder="Masukkan NIS unik" required 
                       class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition bg-gray-50 hover:bg-white">
            </div>

            <div class="md:col-span-2 bg-gray-50 p-4 rounded-xl border border-gray-100 flex items-center">
                <input type="checkbox" name="is_active" id="is_active" checked 
                       class="w-5 h-5 text-blue-600 bg-white border-gray-300 rounded focus:ring-blue-500 cursor-pointer">
                <label for="is_active" class="ml-3 text-sm font-medium text-gray-700 cursor-pointer">
                    Siswa ini masih berstatus <span class="text-emerald-600 font-bold">Aktif</span> dan diizinkan meminjam buku.
                </label>
            </div>
        </div>

        <div class="pt-4 border-t border-gray-100 flex items-center space-x-4">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-medium transition shadow-sm">
                + Tambahkan Siswa
            </button>
            <a href="{% url 'list_siswa' %}" class="text-gray-500 hover:text-gray-800 font-medium transition">Batal</a>
        </div>
    </form>
</div>
{% endblock content %}
